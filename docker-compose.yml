services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: learnforge
      POSTGRES_PASSWORD: learnforge
      POSTGRES_DB: learnforge
    ports:
      - "5432:5432"
    volumes:
      - learnforge_pg:/var/lib/postgresql/data
      - ./services/api/app/database/postgres_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learnforge -d learnforge"]
      interval: 5s
      timeout: 3s
      retries: 20
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  open_notebook_surrealdb:
    image: surrealdb/surrealdb:v2
    profiles: ["notebooklm"]
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    volumes:
      - open_notebook_surreal:/mydata
    environment:
      SURREAL_EXPERIMENTAL_GRAPHQL: "true"
    restart: unless-stopped
  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    profiles: ["notebooklm"]
    ports:
      - "8502:8502"
      - "5055:5055"
    environment:
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY:-learnforgeopennotebooksecret0000}
      OPEN_NOTEBOOK_PASSWORD: ${OPEN_NOTEBOOK_PASSWORD:-}
      SURREAL_URL: ws://open_notebook_surrealdb:8000/rpc
      SURREAL_USER: root
      SURREAL_PASSWORD: root
      SURREAL_NAMESPACE: open_notebook
      SURREAL_DATABASE: open_notebook
    volumes:
      - open_notebook_data:/app/data
    depends_on:
      - open_notebook_surrealdb
    restart: unless-stopped
volumes:
  learnforge_pg:
  open_notebook_surreal:
  open_notebook_data:
